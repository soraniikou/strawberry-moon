<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Strawberry Moon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
    cursor: none;
  }

  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }

  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 48px;
  }

  #scene-title {
    font-size: clamp(14px, 2.5vw, 22px);
    color: rgba(255, 220, 180, 0.0);
    letter-spacing: 0.3em;
    margin-bottom: 24px;
    transition: color 2s ease;
    text-align: center;
  }

  #scene-title.visible { color: rgba(255, 220, 180, 0.85); }

  #hint {
    font-size: clamp(11px, 1.5vw, 14px);
    color: rgba(255, 200, 160, 0.0);
    letter-spacing: 0.2em;
    transition: color 2s ease, opacity 1s ease;
  }

  #hint.visible { color: rgba(255, 200, 160, 0.55); }
  #hint.hidden { opacity: 0; }

  #scene-counter {
    position: absolute;
    top: 24px;
    right: 32px;
    font-size: 12px;
    color: rgba(255, 200, 160, 0.4);
    letter-spacing: 0.15em;
  }

  #cursor {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255, 220, 180, 0.6);
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: transform 0.1s;
    mix-blend-mode: screen;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="cursor"></div>

<div id="ui">
  <div id="scene-title"></div>
  <div id="hint">— Tap to continue —</div>
</div>
<div id="scene-counter"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');
const sceneTitle = document.getElementById('scene-title');
const hint = document.getElementById('hint');
const sceneCounter = document.getElementById('scene-counter');

let W, H, cx, cy;
let mouse = { x: 0, y: 0 };
let scene = 0;
let animFrame = 0;
let stars = [];
let particles = [];
let moonPulse = 0;
let sceneTransition = 0;
let transitioning = false;

const SCENES = [
  {
    bg: ['#3d0a0a', '#1a0505'],
    moonColor: ['#ffc9de', '#ff8fc0'],
    title: 'Strawberry Moon',
    moonSize: 0.22,
  },
  {
    bg: ['#1a0a2e', '#0a0518'],
    moonColor: ['#e8b4e0', '#c478c0'],
    title: 'A Night for You',
    moonSize: 0.25,
  },
  {
    bg: ['#0a1a2e', '#050d1a'],
    moonColor: ['#78b4e8', '#4090d0'],
    title: 'A Quiet Prayer',
    moonSize: 0.20,
  },
  {
    bg: ['#0a2010', '#050f08'],
    moonColor: ['#78e8a0', '#40c070'],
    title: 'Waiting for Dawn',
    moonSize: 0.23,
  },
  {
    bg: ['#2e1a0a', '#1a0a05'],
    moonColor: ['#f4d078', '#e8b040'],
    title: 'Love Returns',
    moonSize: 0.26,
  },
];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  generateStars();
}

function generateStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.6 + 0.2,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005,
    });
  }
}

function spawnParticles(x, y) {
  const s = SCENES[scene];
  for (let i = 0; i < 18; i++) {
    const angle = (Math.PI * 2 / 18) * i + Math.random() * 0.3;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.02 + 0.01,
      r: Math.random() * 3 + 1,
      color: s.moonColor[0],
    });
  }
}

function drawBackground(t) {
  const s = SCENES[scene];
  const ns = SCENES[(scene + 1) % SCENES.length];
  const p = sceneTransition;

  function lerpColor(c1, c2, t) {
    const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
    const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
    const r = Math.round(r1 + (r2-r1)*t), g = Math.round(g1 + (g2-g1)*t), b = Math.round(b1 + (b2-b1)*t);
    return `rgb(${r},${g},${b})`;
  }

  const top = lerpColor(s.bg[0], ns.bg[0], p);
  const bot = lerpColor(s.bg[1], ns.bg[1], p);

  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W,H)*0.8);
  grad.addColorStop(0, top);
  grad.addColorStop(1, bot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawStars(t) {
  stars.forEach(st => {
    st.twinkle += st.speed;
    const alpha = st.alpha * (0.6 + 0.4 * Math.sin(st.twinkle));
    ctx.beginPath();
    ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,240,220,${alpha * (1 - sceneTransition * 0.5)})`;
    ctx.fill();
  });
}

function drawMoon(t) {
  const s = SCENES[scene];
  const ns = SCENES[(scene + 1) % SCENES.length];
  const p = sceneTransition;

  const baseR = Math.min(W, H) * (s.moonSize + (ns.moonSize - s.moonSize) * p);
  moonPulse = Math.sin(t * 0.001) * 0.012;
  const R = baseR * (1 + moonPulse);

  // Glow layers
  for (let i = 4; i >= 0; i--) {
    const glowR = R * (1.5 + i * 0.6);
    const alpha = (0.06 - i * 0.01) * (1 - p * 0.3);
    const grd = ctx.createRadialGradient(cx, cy, R * 0.5, cx, cy, glowR);
    grd.addColorStop(0, `rgba(255,200,120,${alpha})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  }

  // Moon body gradient
  const moonGrd = ctx.createRadialGradient(cx - R*0.2, cy - R*0.2, R*0.1, cx, cy, R);
  moonGrd.addColorStop(0, s.moonColor[0]);
  moonGrd.addColorStop(0.7, s.moonColor[1]);
  moonGrd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = moonGrd;
  ctx.fill();



  // Shimmer
  const shimmer = Math.sin(t * 0.002) * 0.03 + 0.05;
  ctx.beginPath();
  ctx.arc(cx - R*0.25, cy - R*0.3, R*0.35, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,255,255,${shimmer})`;
  ctx.fill();
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= p.decay;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2,'0');
    ctx.fill();
  });
}

function nextScene() {
  if (transitioning) return;
  transitioning = true;
  hint.classList.remove('visible');
  hint.classList.add('hidden');
  sceneTitle.classList.remove('visible');

  let start = null;
  function step(ts) {
    if (!start) start = ts;
    const prog = Math.min((ts - start) / 1500, 1);
    sceneTransition = prog < 0.5 ? prog * 2 * prog * 2 / 2 : 1 - Math.pow(-2*prog+2,2)/2;
    if (prog < 1) {
      requestAnimationFrame(step);
    } else {
      scene = (scene + 1) % SCENES.length;
      sceneTransition = 0;
      transitioning = false;
      setTimeout(() => {
        showSceneText();
      }, 400);
    }
  }
  requestAnimationFrame(step);
}

function showSceneText() {
  sceneTitle.textContent = SCENES[scene].title;
  sceneTitle.classList.add('visible');
  setTimeout(() => {
    hint.classList.remove('hidden');
    hint.classList.add('visible');
  }, 1200);
}

function draw(t) {
  animFrame = requestAnimationFrame(draw);
  ctx.clearRect(0, 0, W, H);

  drawBackground(t);
  drawStars(t);
  drawMoon(t);
  drawParticles();

  sceneCounter.textContent = `${scene + 1} / ${SCENES.length}`;
}

// Events
window.addEventListener('resize', resize);

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  cursor.style.left = mouse.x + 'px';
  cursor.style.top = mouse.y + 'px';
});

window.addEventListener('click', e => {
  spawnParticles(e.clientX, e.clientY);
  nextScene();
});

window.addEventListener('touchstart', e => {
  const t = e.touches[0];
  cursor.style.left = t.clientX + 'px';
  cursor.style.top = t.clientY + 'px';
  spawnParticles(t.clientX, t.clientY);
  nextScene();
}, { passive: true });

// Init
resize();
sceneTitle.textContent = SCENES[0].title;
setTimeout(() => {
  sceneTitle.classList.add('visible');
  setTimeout(() => {
    hint.classList.add('visible');
  }, 1500);
}, 800);

requestAnimationFrame(draw);
</script>
</body>
</html>
